<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Urban & Suburban Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Urban & Suburban – Quiz</h1>
    <div id="quiz-intro">
      <p>
        Test your knowledge about the political landscape in urban, suburban, and rural America!<br>
        Each question is based on the slides you studied.
      </p>
      <button id="start-btn">Start Quiz</button>
    </div>
    <div id="quiz-box" class="hidden">
      <div id="question"></div>
      <form id="answers"></form>
      <div id="feedback"></div>
      <button id="next-btn" class="hidden">Next</button>
    </div>
    <div id="result-box" class="hidden">
      <h2>Your Results</h2>
      <p id="score"></p>
      <ul id="explanations"></ul>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </div>
  <script src="quiz.js"></script>
</body>
</html>
