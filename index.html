<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Urban & Suburban Elections Game</title>
  <link href="https://fonts.googleapis.com/css?family=Quicksand:600,700|Montserrat:400,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --urban: #3367d6;
      --suburban: #43a047;
      --bg: #191b24;
      --accent: #ffd600;
      --danger: #fa5252;
    }

    html, body {
      background: var(--bg);
      color: #fff;
      margin: 0;
      padding: 0;
      font-family: 'Quicksand', 'Montserrat', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container {
      max-width: 500px;
      margin: 60px auto;
      background: #23253b;
      border-radius: 22px;
      box-shadow: 0 8px 40px #0008;
      padding: 34px 30px 30px 30px;
      position: relative;
      text-align: center;
    }
    h1 {
      font-family: 'Quicksand', sans-serif;
      font-size: 2.3rem;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    h2 { color: #ccc }
    .roles {
      display: flex;
      justify-content: space-between;
      margin: 20px 0 30px 0;
    }
    .role { flex: 1; padding: 12px; border-radius: 13px; margin: 0 6px; background: #1e2033; font-weight: 700; }
    .role.urban { border: 2px solid var(--urban); color: var(--urban); }
    .role.suburban { border: 2px solid var(--suburban); color: var(--suburban); }
    .hidden { display: none !important; }

    /* Glücksrad */
    #wheelCanvas {
      margin: 25px auto 0 auto;
      display: block;
      border-radius: 50%;
      border: 7px solid #333;
    }
    #spinBtn {
      margin-top: 18px;
      background: linear-gradient(90deg,var(--accent),#f1c40f 70%);
      border: none;
      color: #222;
      font-weight: bold;
      padding: 13px 38px;
      font-size: 1.2rem;
      border-radius: 28px;
      cursor: pointer;
      box-shadow: 0 4px 16px #0004;
      letter-spacing: 1px;
      transition: background .2s;
    }
    #spinBtn:active { background: #fff200; }

    /* Countdown Timer */
    #timer {
      font-size: 2.4rem;
      margin: 20px 0 8px 0;
      font-family: monospace;
      color: var(--danger);
      letter-spacing: 6px;
      text-shadow: 0 2px 10px #f22a;
      opacity: .92;
      animation: pulse 1s infinite alternate;
    }
    @keyframes pulse { to { color: #fff; } }
    .role-card {
      background: #252851;
      border-radius: 17px;
      padding: 24px;
      color: #fff;
      margin: 17px auto 10px auto;
      max-width: 96%;
      box-shadow: 0 0 14px #0006;
      transition: .6s cubic-bezier(.41,1.41,.37,.99);
    }
    .role-title { font-size: 1.25rem; margin-bottom: 11px; color: var(--accent);}
    .role-desc { color: #ddd; font-size: 1.05rem;}
    #nextBtn {
      margin-top: 22px;
      background: var(--urban);
      color: #fff;
      padding: 13px 38px;
      border-radius: 28px;
      border: none;
      font-size: 1.15rem;
      font-weight: bold;
      letter-spacing: 1.2px;
      transition: background .2s;
      cursor: pointer;
      box-shadow: 0 3px 12px #0004;
    }
    #nextBtn:active { background: #49a0fa; }

    /* Voting UI */
    .voting {
      margin-top: 18px;
      background: #262947;
      border-radius: 16px;
      padding: 21px 7px 13px 7px;
      box-shadow:  0 0 8px #2227 inset;
    }
    .vote-question {
      font-size: 1.18rem;
      font-weight: 600;
      margin-bottom: 18px;
      color: var(--accent);
    }
    .vote-options {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 14px;
    }
    .vote-btn {
      font-size: 1.1rem;
      font-family: inherit;
      background: var(--accent);
      color: #333;
      border: none;
      padding: 10px 25px;
      border-radius: 21px;
      cursor: pointer;
      box-shadow: 0 2px 10px #0002;
      font-weight: bold;
      transition: background .2s;
    }
    .vote-btn:active { background: #fff078; }
    .vote-progress {
      width: 100%;
      height: 15px;
      border-radius: 10px;
      background: #36395c;
      margin-top: 16px;
      overflow: hidden;
      position: relative;
    }
    .vote-bar {
      height: 100%;
      position: absolute;
      left: 0; top: 0;
      background: linear-gradient(90deg,var(--urban),var(--suburban));
      width: 0;
      transition: width 1.2s cubic-bezier(.4,1.15,.35,1);
    }
    #votePieWrap { margin: 24px auto 0 auto; max-width: 300px; }
    #votePie {
      width: 100%; max-width: 290px;
      border-radius: 50%;
      display: block;
      margin: 0 auto 11px auto;
      background: #222;
      border: 7px solid #444;
      box-shadow: 0 6px 32px #0007;
      min-height: 210px;
    }
    .pie-label { font-size: 1rem; margin: 2px 0; color: #eee;}

    @media (max-width: 600px) {
      .container { padding: 17px 4vw 20px 4vw; }
      h1 { font-size: 1.45rem; }
      .roles { flex-direction: column; gap: 6px;}
      .role { margin: 0 0 7px 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Urban & Suburban<br>Elections Game</h1>
    <div class="roles">
      <div class="role urban">Urban</div>
      <div class="role suburban">Suburban</div>
    </div>

    <!-- Glücksrad / Rollenverteilung -->
    <canvas id="wheelCanvas" width="300" height="300"></canvas>
    <button id="spinBtn">Glücksrad starten</button>

    <!-- Countdown & Rolle -->
    <div id="roleScreen" class="hidden">
      <div id="timer"></div>
      <div class="role-card">
        <div class="role-title" id="roleTitle"></div>
        <div class="role-desc" id="roleDesc"></div>
      </div>
      <button id="nextBtn">Zur Abstimmung!</button>
    </div>

    <!-- Votingphase -->
    <div id="voteScreen" class="hidden">
      <div class="voting">
        <div id="question"></div>
        <div class="vote-options" id="voteOptions"></div>
        <div class="vote-progress"><div class="vote-bar" id="voteBar"></div></div>
      </div>
      <div id="votePieWrap" class="hidden">
        <canvas id="votePie" width="290" height="220"></canvas>
        <div class="pie-label" id="pieLabel"></div>
      </div>
    </div>
  </div>

  <script>
    // --- Rolle-Beschreibungen
    const roles = [
      {
        name: "Urban",
        desc: "Als Urban wohnst du in der Innenstadt. Du bist progressiv, hast viele Mitmenschen um dich, bist politisch aktiv und genießt die Vielfalt deiner Nachbarschaft."
      },
      {
        name: "Suburban",
        desc: "Als Suburban bist du im grünen Umland zuhause. Für dich zählen Nachbarschaft, Nähe zur Natur, ein eigenes Haus, und du bist meist zurückhaltender in Politik oder Wandel."
      }
    ];

    // --- Glücksrad
    const wheelColors = ["#3367d6", "#43a047"];
    const wheelLabels = ["Urban", "Suburban"];

    const wheel = document.getElementById("wheelCanvas");
    const ctx = wheel.getContext("2d");
    let wheelAngle = 0;
    let spinning = false, assignedRole = null;

    function drawWheel(angle=0) {
      ctx.clearRect(0, 0, wheel.width, wheel.height);
      const r = wheel.width / 2;
      for(let i=0; i<2;i++){
        ctx.beginPath();
        ctx.moveTo(r,r);
        ctx.arc(r,r,r-5,angle+i*Math.PI,angle+(i+1)*Math.PI);
        ctx.closePath();
        ctx.fillStyle = wheelColors[i];
        ctx.fill();
        ctx.save();
        ctx.translate(r,r);
        ctx.rotate(angle+i*Math.PI+Math.PI/2);
        ctx.textAlign = "center";
        ctx.fillStyle="#fff";
        ctx.font="bold 28px Quicksand,sans-serif";
        ctx.fillText(wheelLabels[i], 0, -90);
        ctx.restore();
      }
      // Pfeil
      ctx.save();
      ctx.beginPath();
      ctx.translate(r,15);
      ctx.moveTo(0,0);
      ctx.lineTo(-16,-22); ctx.lineTo(0,-36);
      ctx.lineTo(16,-22); ctx.closePath();
      ctx.fillStyle = "#ffd600";
      ctx.shadowColor="#ffd600";
      ctx.shadowBlur=9;
      ctx.fill();
      ctx.restore();
    }

    drawWheel(wheelAngle);

    document.getElementById("spinBtn").onclick = function(){
      if (spinning) return;
      spinning = true;
      let spinTime = 0;
      let totalSpin = 3000 + Math.random()*1400;
      let lastAngle=wheelAngle;
      function animate(now=performance.now(),startNow=now){
        spinTime = now-startNow;
        let progress = spinTime/totalSpin;
        if(progress > 1) progress=1;
        let speed = 1-(progress);
        let delta = 0.18 + 5*speed*speed;
        wheelAngle += delta * (progress < 1 ? 1 : 0.2);
        wheelAngle %= Math.PI*2;
        drawWheel(wheelAngle);
        if(progress<1){
          requestAnimationFrame((n)=>animate(n,startNow));
        } else {
          spinning=false;
          // Bestimme Rolle anhand des Winkels:
          let val = ((wheelAngle% (Math.PI*2))/Math.PI);
          assignedRole = (val < 1) ? 0 : 1;  // 0=Urban, 1=Suburban
          setTimeout(showRoleScreen, 850);
        }
      }
      animate();
      this.disabled = true;
      this.textContent = "Glücksrad dreht…";
    };

    // Rolle anzeigen + Timer
    function showRoleScreen(){
      document.getElementById("spinBtn").classList.add("hidden");
      wheel.classList.add("hidden");
      document.getElementById("roleScreen").classList.remove("hidden");
      let role = roles[assignedRole];
      document.getElementById("roleTitle").textContent = "Deine Rolle: "+role.name;
      document.getElementById("roleDesc").textContent = role.desc;
      startTimer(240);
    }

    // --- 4-Minuten-Countdown
    let countdownInt, timeLeft=240;
    function startTimer(secs){
      timeLeft=secs;
      updateTimer();
      countdownInt = setInterval(()=>{
        timeLeft--;
        updateTimer();
        if(timeLeft <= 0) {
          clearInterval(countdownInt);
          document.getElementById("nextBtn").disabled=false;
          document.getElementById("timer").textContent="⏳ Zeit abgelaufen!";
        }
      },1000);
    }
    function updateTimer(){
      let min = Math.floor(timeLeft/60).toString();
      let sec = (timeLeft%60).toString().padStart(2,"0");
      document.getElementById("timer").textContent = `⏰ ${min}:${sec} `;
      document.getElementById("nextBtn").disabled=true;
      if(timeLeft<=0) document.getElementById("nextBtn").disabled=false;
    }

    document.getElementById("nextBtn").onclick = function(){
      clearInterval(countdownInt);
      document.getElementById("roleScreen").classList.add("hidden");
      startVoting();
    };

    // --- VOTINGS
    const votingQuestions = [
      {
        q: "Stimme ab: Sollen in der Stadt mehr Parks gebaut werden?",
        options: ["Ja", "Nein"]
      },
      {
        q: "Bist du für einen Ausbau des Nahverkehrs?",
        options: ["Ja", "Nein"]
      },
      {
        q: "Soll Suburbia neue Einkaufsmöglichkeiten bekommen?",
        options: ["Ja", "Nein"]
      }
    ];
    let votingRound = 0;
    let fakeVotes = [];
    function startVoting() {
      document.getElementById("voteScreen").classList.remove("hidden");
      showVotingQuestion();
    }
    function showVotingQuestion() {
      // Voting-UI vorbereiten
      let q = votingQuestions[votingRound];
      document.getElementById("question").innerHTML = `<span class='vote-question'>${q.q}</span>`;
      let optHtml = '', optLen=q.options.length;
      for(let i=0;i<optLen;i++){
        optHtml += `<button class="vote-btn" onclick="castVote(${i})">${q.options[i]}</button>`;
      }
      document.getElementById("voteOptions").innerHTML = optHtml;
      document.getElementById("voteBar").style.width="0";
      document.getElementById("votePieWrap").classList.add("hidden");
    }

    // --- Fake-Vote-Animation (Urban & Suburban simuliert, Suburban entscheidet!!)
    window.castVote = function(opt){
      document.getElementById("voteOptions").innerHTML="<div style='font-size:1.17rem;color:#ccc'>Vielen Dank für deine Stimme!</div>";
      // Simuliere Daten "fliegen ein"
      let total=0, urban=0, suburban=0, interval=null, maxVotes=49+Math.floor(Math.random()*11);
      let rollName = roles[assignedRole].name;
      // Urban-Leute stimmen progressiver, Suburb konservativer
      for(let i=0;i<maxVotes;i++){
        if (Math.random() < 0.54) {
          // Doppelt soviele Suburbans (sie sind entscheidend!)
          fakeVotes.push({type: "Suburban", vote: (Math.random()<0.5 ? 0 : 1)});
        } else {
          fakeVotes.push({type: "Urban", vote: (Math.random()<0.75 ? 0 : 1)});
        }
      }
      // User-Vote zählt als letzter urban/suburban
      fakeVotes.push({type: rollName, vote: opt});
      let animIdx=0, urbYes=0, urbNo=0, subYes=0, subNo=0;
      interval = setInterval(()=> {
        if(animIdx>=fakeVotes.length){
          clearInterval(interval);
          setTimeout(showPieChart, 900, urbYes+subYes, urbNo+subNo, subYes, subNo);
          return;
        }
        let v=fakeVotes[animIdx];
        if(v.type==="Urban") v.vote==0 ? urbYes++ : urbNo++
        else v.vote==0 ? subYes++ : subNo++;
        animIdx++;
        let percent = (animIdx/fakeVotes.length)*100;
        document.getElementById("voteBar").style.width = percent+"%";
      }, Math.max(44,220-fakeVotes.length));
    }

    // --- PIE Chart + Reveal Suburbans entscheiden!
    function showPieChart(urbanYes, urbanNo, suburbYes, suburbNo){
      document.getElementById("votePieWrap").classList.remove("hidden");
      let pie = document.getElementById("votePie");
      let ctx2 = pie.getContext("2d");
      ctx2.clearRect(0,0,pie.width,pie.height);
      let urbanTotal = urbanYes+urbanNo;
      let suburbTotal = suburbYes+suburbNo;
      let all = urbanTotal + suburbTotal;
      let uv = urbanYes+suburbYes, nv = urbanNo+suburbNo;

      // Piechart-Animationen
      let angleYes=0, angleNo=0, step=0;
      function ani(){
        // In Schritten von 0->Ende den Chart aufbauen:
        step+=0.06;
        angleYes = step * (uv/all)*2*Math.PI;
        angleNo  = step * (nv/all)*2*Math.PI;
        ctx2.clearRect(0,0,pie.width,pie.height);
        // Yes // Urban = Blau, Suburb = Grün
        let start=0;
        ctx2.beginPath();
        ctx2.moveTo(145,110);
        ctx2.arc(145,110,90,start,start+angleYes); ctx2.lineTo(145,110); ctx2.closePath();
        ctx2.fillStyle="#3367d6"; ctx2.globalAlpha=0.74; ctx2.fill();
        // Nein
        ctx2.beginPath();
        ctx2.moveTo(145,110);
        ctx2.arc(145,110,90,start+angleYes,start+angleYes+angleNo);
        ctx2.lineTo(145,110); ctx2.closePath();
        ctx2.fillStyle="#43a047"; ctx2.globalAlpha=0.74; ctx2.fill();
        ctx2.globalAlpha=1.0;
        // Animation zuende?
        if(step<1.0) requestAnimationFrame(ani);
      }
      ani();

      // Textlabel
      let decision = suburbYes>suburbNo ? "Suburbans entscheiden: JA!" : "Suburbans entscheiden: NEIN!";
      let s = `<b>Urban:</b> ${urbanYes} / ${urbanNo} &nbsp; | &nbsp;<b>Suburban:</b> ${suburbYes} / ${suburbNo}<br><span style="color:var(--accent);font-size:1.1em">${decision}</span>`;
      document.getElementById("pieLabel").innerHTML = s;

      setTimeout(function(){
        votingRound++;
        fakeVotes = [];
        if(votingRound < votingQuestions.length){
          setTimeout(showVotingQuestion, 2000);
        }else{
          // ENDE
          document.getElementById("voteScreen").innerHTML = "<h2>Danke fürs Mitmachen!<br>Die Suburbs entscheiden die Wahl! 😄</h2><div style='margin-top:23px'>Erstelle neue Runden, indem du die Seite aktualisierst.</div>";
        }
      }, 3500);
    }
  </script>
</body>
</html>
